<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Estação Meteorológica{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Estacao Meteorologica IoT</div>
        <div class="nav-links">
            <a href="{{ url_for('index') }}" class="{% if request.endpoint == 'index' %}active{% endif %}">Painel</a>
            <a href="{{ url_for('listar') }}" class="{% if request.endpoint == 'listar' %}active{% endif %}">Historico</a>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>Estacao Meteorologica IoT &mdash; Engenharia de Computacao, Modulo 5</p>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
