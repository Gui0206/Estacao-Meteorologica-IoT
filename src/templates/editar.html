{% extends "base.html" %}

{% block title %}Editar Leitura #{{ leitura.id }}{% endblock %}

{% block content %}
<h1>Editar Leitura #{{ leitura.id }}</h1>
<p class="subtitle">Registrada em: {{ leitura.timestamp }}</p>

<form id="form-editar" class="form-card">
    <div class="form-group">
        <label for="temperatura">Temperatura (&#176;C)</label>
        <input type="number" step="0.1" id="temperatura" name="temperatura"
               value="{{ leitura.temperatura }}" required>
    </div>

    <div class="form-group">
        <label for="umidade">Umidade (%)</label>
        <input type="number" step="0.1" id="umidade" name="umidade"
               value="{{ leitura.umidade }}" required>
    </div>

    <div class="form-group">
        <label for="pressao">Pressao (hPa)</label>
        <input type="number" step="0.1" id="pressao" name="pressao"
               value="{{ leitura.pressao if leitura.pressao else '' }}">
    </div>

    <div class="form-group">
        <label for="localizacao">Localizacao</label>
        <input type="text" id="localizacao" name="localizacao"
               value="{{ leitura.localizacao }}">
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Salvar</button>
        <a href="{{ url_for('listar') }}" class="btn">Cancelar</a>
    </div>
</form>

<div id="mensagem" class="mensagem" style="display:none;"></div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
<script>
    const leituraId = {{ leitura.id }};

    document.getElementById('form-editar').addEventListener('submit', function(e) {
        e.preventDefault();

        const dados = {
            temperatura: parseFloat(document.getElementById('temperatura').value),
            umidade: parseFloat(document.getElementById('umidade').value),
            localizacao: document.getElementById('localizacao').value
        };

        const pressao = document.getElementById('pressao').value;
        if (pressao) {
            dados.pressao = parseFloat(pressao);
        }

        fetch(`/leituras/${leituraId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(dados)
        })
        .then(resp => resp.json())
        .then(data => {
            const msg = document.getElementById('mensagem');
            if (data.status === 'atualizado') {
                msg.textContent = 'Leitura atualizada com sucesso!';
                msg.className = 'mensagem sucesso';
            } else {
                msg.textContent = 'Erro ao atualizar: ' + (data.erro || 'desconhecido');
                msg.className = 'mensagem erro';
            }
            msg.style.display = 'block';
        });
    });
</script>
{% endblock %}
